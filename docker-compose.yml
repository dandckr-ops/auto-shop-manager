services:
  app:
    build: .
    container_name: auto-shop-manager
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DATA_DIR: /data
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 8787
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-true}
    ports:
      - "8787:8787"
    volumes:
      - auto-shop-app-data:/data
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: auto-shop-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - auto-shop-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  auto-shop-app-data:
  auto-shop-postgres-data:
