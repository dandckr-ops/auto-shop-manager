services:
  app:
    environment:
      SHOP_PUBLIC_URL: ${SHOP_PUBLIC_URL:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OAUTH2_PROXY_EMAIL_DOMAINS: ${OAUTH2_PROXY_EMAIL_DOMAINS:-*}
      LOCAL_AUTH_ENABLED: ${LOCAL_AUTH_ENABLED:-true}
      LOCAL_AUTH_USERNAME: ${LOCAL_AUTH_USERNAME:-admin}
      LOCAL_AUTH_PASSWORD: ${LOCAL_AUTH_PASSWORD:-}
    ports:
      - "8787:8787"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: auto-shop-cloudflared
    depends_on:
      - app
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    restart: unless-stopped
    profiles:
      - cloudflared
